############################################################
#
# Panda Cluster Configuration
#
# Named after Chapultepec pandas.
#
#   shuanshuan : 2 × NVIDIA Quadro RTX 4000
#   tohui      : NVIDIA GeForce RTX 5090
#   xinxin     : NVIDIA GeForce GTX 1070
#
############################################################

############################################################
# General
############################################################

CLUSTER_NAME="Panda Cluster"
CLUSTER_VERSION="0.1.0"

CLUSTER_OWNER="Luis Antonio Domínguez Ramírez"
CLUSTER_LOCATION="Instituto de Geofísica, UNAM"

############################################################
# Nodes
############################################################

CONTROLLER="shuanshuan"

NODES=(
    "shuanshuan"
    "tohui"
    "xinxin"
)

############################################################
# Partitions
############################################################

DEFAULT_PARTITION="cpu"

PARTITIONS=(
    "cpu"
    "gpu"
    "shuanshuan"
    "tohui"
    "xinxin"
)

############################################################
# Slurm
############################################################

SLURM_HOME="/usr/local/slurm"
SLURM_ETC="${SLURM_HOME}/etc"

############################################################
# Logs
############################################################

LOG_DIR="$HOME/clusterlogs/Logs"

############################################################
# SSH
############################################################

SSH_TIMEOUT=2

############################################################
# Software
############################################################

DEFAULT_CONDA_ENV="torch-py312"

############################################################
# Node Information
############################################################

declare -A NODE_GPU

NODE_GPU["shuanshuan"]="2x Quadro RTX 4000"
NODE_GPU["tohui"]="RTX 5090"
NODE_GPU["xinxin"]="GTX 1070"

declare -A NODE_CPUS

NODE_CPUS["shuanshuan"]=8
NODE_CPUS["tohui"]=32
NODE_CPUS["xinxin"]=32

declare -A NODE_MEMORY

NODE_MEMORY["shuanshuan"]="64 GB"
NODE_MEMORY["tohui"]="128 GB"
NODE_MEMORY["xinxin"]="32 GB"

declare -A NODE_ROLE

NODE_ROLE["shuanshuan"]="controller,gpu"
NODE_ROLE["tohui"]="gpu"
NODE_ROLE["xinxin"]="gpu"

CLUSTER_MOTTO="Powered by pandas 🐼."

############################################################
# End of configuration
############################################################
