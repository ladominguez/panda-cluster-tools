############################################################
#
# Panda Cluster Configuration
#
# Named after the famous animals of Chapultepec Zoo.
#
############################################################

############################################################
# General
############################################################

CLUSTER_NAME="Bamboo Cluster"
CLUSTER_VERSION="0.1.0"

CLUSTER_OWNER="Luis Antonio Domínguez"
CLUSTER_LOCATION="Instituto de Geofísica, UNAM"

############################################################
# Nodes
############################################################

CONTROLLER="shuanshuan"

NODES=(
    "shuanshuan"
    "tohui"
    "xinxin"
)

############################################################
# GPU mapping
############################################################

declare -A GPU_NODE=(
    [5090]="tohui"
    [1070]="xinxin"
    [quadro]="shuanshuan"
)

declare -A GPU_DESCRIPTION=(
    [5090]="NVIDIA RTX 5090"
    [1070]="NVIDIA GTX 1070"
    [quadro]="2 × NVIDIA Quadro RTX 4000"
)

############################################################
# Slurm
############################################################

SLURM_HOME="/usr/local/slurm"
SLURM_ETC="$SLURM_HOME/etc"

############################################################
# Logging
############################################################

LOG_DIR="$HOME/clusterlogs/Logs"

############################################################
# SSH
############################################################

SSH_TIMEOUT=2

############################################################
# Shared Research directory on each node
############################################################

declare -A PATH_MAP

PATH_MAP["shuanshuan"]="/home/lantonio/SynologyDrive/Research"
PATH_MAP["tohui"]="/data/antonio/SynologyDrive/Research"
PATH_MAP["xinxin"]="/home/lantonio/SynologyDrive/Research"

declare -A PANDA_ROOT

PANDA_ROOT["shuanshuan"]="/home/lantonio/Repositories/panda-cluster-tools"
PANDA_ROOT["tohui"]="/data/antonio/Repositories/panda-cluster-tools"
PANDA_ROOT["xinxin"]="/home/lantonio/Repositories/panda-cluster-tools"
